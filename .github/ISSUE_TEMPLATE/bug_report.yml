name: Bug report
description: Report something not working as expected
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting this. Please provide concrete reproduction details.
  - type: textarea
    id: summary
    attributes:
      label: What happened?
      description: Describe expected behavior vs actual behavior.
      placeholder: "Expected X, but got Y..."
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Numbered steps are best.
      placeholder: |
        1. Open ...
        2. Click ...
        3. See error ...
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Diagnostics / logs
      description: Paste output from "Copy Diagnostics" if possible.
      render: shell
  - type: input
    id: version
    attributes:
      label: App version
      description: From Setup -> Update channel, or git commit hash.
      placeholder: "v0.5.0 or e4515cc"
  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - macOS
        - Linux
        - Windows
        - Other
    validations:
      required: true
