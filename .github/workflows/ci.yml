name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  python-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Python tooling
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
      - name: Ruff
        run: ruff check app tests
      - name: Mypy
        run: mypy app/backend/server.py tests/test_backend.py
      - name: Unit + integration tests
        run: python -m unittest discover -s tests -v
      - name: Smoke test backend boot
        run: |
          RSYNC_WEBAPP_HOST=127.0.0.1 RSYNC_WEBAPP_PORT=8799 python app/backend/server.py &
          PID=$!
          sleep 1
          curl -fsS http://127.0.0.1:8799/api/health >/dev/null
          kill "${PID}"
          wait "${PID}" || true

  frontend-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install frontend tooling
        run: npm install --no-audit --no-fund
      - name: Lint frontend
        run: npm run lint:frontend
