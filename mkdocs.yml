site_name: rsync.wa Docs
site_description: Documentation for rsyncwebapp (local-first rsync operations console)
site_url: https://pkhodo.github.io/rsyncwebapp/
repo_url: https://github.com/pkhodo/rsyncwebapp
repo_name: pkhodo/rsyncwebapp

theme:
  name: material
  features:
    - navigation.instant
    - navigation.sections
    - navigation.top
    - search.highlight
    - content.code.copy

markdown_extensions:
  - admonition
  - toc:
      permalink: true
  - pymdownx.superfences
  - pymdownx.highlight

plugins:
  - search

nav:
  - User Docs:
      - Quick Start: index.md
      - Web App Guide: WEB-APP.md
  - Ops & Security:
      - Architecture: ARCHITECTURE.md
      - Security Audit: SECURITY-AUDIT.md
  - Maintainer Docs:
      - Migrations: MIGRATIONS.md
      - UX Voice: UX-VOICE.md
      - Apple Signing (Optional): APPLE-SIGNING.md
