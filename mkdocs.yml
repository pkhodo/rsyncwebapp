site_name: rsync.wa Docs
site_description: Documentation for rsyncwebapp (local-first rsync operations console)
site_url: https://pkhodo.github.io/rsyncwebapp/
repo_url: https://github.com/pkhodo/rsyncwebapp
repo_name: pkhodo/rsyncwebapp

theme:
  name: material
  features:
    - navigation.instant
    - navigation.sections
    - navigation.top
    - search.highlight
    - content.code.copy

markdown_extensions:
  - admonition
  - toc:
      permalink: true
  - pymdownx.superfences
  - pymdownx.highlight

plugins:
  - search

nav:
  - Home: index.md
  - Web App Guide: WEB-APP.md
  - Architecture: ARCHITECTURE.md
  - Migrations: MIGRATIONS.md
  - Security Audit: SECURITY-AUDIT.md
  - UX Voice: UX-VOICE.md
  - Apple Signing: APPLE-SIGNING.md
